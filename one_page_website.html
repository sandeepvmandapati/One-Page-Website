<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>My One-Page Website</title>
</head>
<body>
<nav>
    <a href="#home">Home</a> |
    <a href="#gallery">Gallery</a> |
    <a href="#contact">Contact</a> |
    <a href="#video">Video</a>
</nav>

<hr>
<section id="home">

    <h1>Welcome to My One-Page Website</h1>

    <p>
        This website was created as part of my HTML assignment.
        It includes navigation, images, a contact form, a video, and a footer.
    </p>

</section>

<hr>
<section id="gallery">

    <h2>Image Gallery</h2>

    <img src="images/image1.jpg" alt="Image 1" width="300">

    <img src="images/image2.jpg" alt="Image 2" width="300">

    <img src="images/image3.jpg" alt="Image 3" width="300">

</section>

<hr>
<section id="contact">

    <h2>Contact Us</h2>

    <form>

        <label>Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Message:</label><br>
        <textarea rows="5" cols="40"></textarea><br><br>

        <input type="submit" value="Submit">

    </form>

</section>

<hr>
<section id="video">

    <h2>Featured Video</h2>

    <iframe
    width="560"
    height="315"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    title="YouTube video"
    frameborder="0"
    allowfullscreen>
</iframe>

</section>

<hr>
<footer>

    <p>&copy; 2026 My One-Page Website | Created by Sandeep</p>

</footer>    
</body>
</html>
